name = "novel-generator"
compatibility_date = "2024-04-10"
compatibility_flags = ["nodejs_compat"]

# 配置环境变量（请在 Cloudflare dashboard 设置实际值）
# [vars]
# ZHIPU_AI_API_KEY = "your-api-key-here"
# ZHIPU_AI_API_BASE = "https://open.bigmodel.cn/api/paas/v4/"
# ZHIPU_AI_MODEL = "doubao-seed-2.0-pro"

[build]
command = ""
# Cloudflare Pages 会自动处理依赖安装

[dev]
port = 3000

[[rules]]
pattern = "/api/*"
function = "app"

[[rules]]
pattern = "/health"
function = "app"

# 静态文件由 Cloudflare Pages 自动处理
