name = "novel-generator"
compatibility_date = "2024-04-10"
compatibility_flags = ["nodejs_compat"]

# 配置入口点 - Cloudflare Workers 需要 main 入口
main = "workers.js"

# 配置 Node.js 内置模块 polyfill
[node_compat]
true = true

# 配置环境变量（请在 Cloudflare dashboard 设置实际值，或在这里填写）
# [vars]
# ZHIPU_AI_API_KEY = "your-api-key-here"
# ZHIPU_AI_API_BASE = "https://open.bigmodel.cn/api/paas/v4/"
# ZHIPU_AI_MODEL = "doubao-seed-2.0-pro"

[build]
command = ""

[dev]
port = 3000
